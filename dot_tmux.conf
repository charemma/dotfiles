set -g @plugin 'laktak/extrakto'
bind-key = set-window-option synchronize-panes

setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind -T copy-mode-vi v send -X begin-selection

# Setup 'y' to yank (copy) as in Vim
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$CLIPBOARD_CLI"

bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "CLIPBOARD_CLI"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Options to make tmux more pleasant
set -g mouse on

# Set kitty window title to session name (if named) or current directory
set -g set-titles on
set -g set-titles-string "#{?#{==:#{session_name},0},#{b:pane_current_path},#{session_name}}"
set -g renumber-windows on
set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "latte"
set -g @catppuccin_window_status_style "basic"

set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# Load catppuccin (must come after config options)
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
